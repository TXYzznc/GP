<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Clash of Gods 用例图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: "SimSun", "宋体", serif; padding: 40px; }
  .page {
    width: 800px; margin: 0 auto 60px; page-break-after: always;
  }
  .page-title {
    text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 20px;
  }
  svg { display: block; margin: 0 auto; }

  /* SVG styles */
  .sys-border { fill: none; stroke: #000; stroke-width: 1.5; }
  .sys-title { font-family: "SimSun", "宋体", serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
  .usecase { fill: #fff; stroke: #000; stroke-width: 1.2; }
  .usecase-text { font-family: "SimSun", "宋体", serif; font-size: 12px; text-anchor: middle; dominant-baseline: central; }
  .actor-line { stroke: #000; stroke-width: 1.5; stroke-linecap: round; }
  .actor-circle { fill: none; stroke: #000; stroke-width: 1.5; }
  .actor-label { font-family: "SimSun", "宋体", serif; font-size: 13px; text-anchor: middle; }
  .assoc-line { stroke: #000; stroke-width: 1; }
  .include-line { stroke: #000; stroke-width: 1; stroke-dasharray: 6,3; }
  .include-text { font-family: "SimSun", "宋体", serif; font-size: 10px; text-anchor: middle; }
  .extend-line { stroke: #000; stroke-width: 1; stroke-dasharray: 6,3; }
  .note { font-family: "SimSun", "宋体", serif; font-size: 10px; fill: #666; }

  @media print {
    .page { page-break-after: always; margin-bottom: 0; }
    body { padding: 20px; }
  }
</style>
</head>
<body>
